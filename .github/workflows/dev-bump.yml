name: Bump to dev version

on:
  workflow_dispatch:
    inputs:
      dev_version:
        description: 'Dev version string (e.g. 1.2.4-dev)'
        required: true

permissions:
  contents: write

jobs:
  dev-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate dev version format
        run: |
          echo "${{ inputs.dev_version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-[a-z]' || \
            { echo "dev_version must match X.Y.Z-suffix, e.g. 1.2.4-dev"; exit 1; }

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stamp VERSION
        run: echo "${{ inputs.dev_version }}" > VERSION

      - name: Commit and push
        run: |
          git add VERSION
          git commit -m "chore: begin development of v${{ inputs.dev_version }}"
          git push origin main
